<!DOCTYPE html>

<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotMySpace - Multifloor Generator</title>
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>

<body class="bg-[var(--bg-page)] text-[var(--text-primary)] h-screen flex flex-col overflow-hidden">

    {% include 'partials/sidebar.html' %}
    
    <main class="app-main flex-1 h-screen flex flex-col">
        {% include 'partials/topbar.html' %}

        <div class="flex-1 p-6 overflow-hidden">

    <div class="h-full bg-[#1c1c1f] border border-[#2e2e33] rounded-xl flex flex-col overflow-hidden">

        <div class="p-6 border-b border-[#2e2e33] bg-[#18181b]">

            <h1 class="text-xl font-semibold">
                Multifloor Layout Generator
            </h1>

            <p class="text-sm text-zinc-400 mt-1">
                Generate AI-created multi-floor building layouts and preview the rendered floor plan.
            </p>

        </div>

        <div class="px-6 py-4 border-b border-[#2e2e33] flex items-center gap-3">

            <span
                id="statusDot"
                class="w-2.5 h-2.5 rounded-full bg-green-500"
            ></span>

            <span
                id="status"
                class="text-sm text-zinc-300"
            >
                Ready
            </span>

        </div>

        <div class="flex-1 p-6 overflow-auto bg-[#18181b]">

            <div
                class="h-full min-h-[500px]
                       border border-[#2e2e33]
                       rounded-xl
                       bg-[#0e0e10]
                       flex items-center justify-center"
            >

                <img
                    id="viewer"
                    class="max-w-full max-h-full object-contain"
                />

            </div>

        </div>

        <div class="p-4 border-t border-[#2e2e33] bg-[#18181b] flex justify-end gap-3">

            <button
                id="downloadBtn"
                class="px-4 py-2 bg-[#0e0e10]
                       border border-[#2e2e33]
                       hover:bg-[#26262b]
                       rounded-lg
                       text-sm"
            >
                Download DXF
            </button>

            <button
                id="generateBtn"
                class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg font-medium transition-colors"
            >
                Generate Layout
            </button>

        </div>

    </div>

    </div>

</main>

<script src="{{ url_for('static', filename='js/multifloor.js') }}"></script>

</body>
</html>
