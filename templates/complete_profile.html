<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - PlotMySpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Uses system preference for dark mode
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#3b82f6', // blue-500
                            600: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex items-center justify-center min-h-screen p-4 font-sans transition-colors duration-200">

    <div class="w-full max-w-3xl bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden">

        <div class="px-8 py-6 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50">
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome to PlotMySpace</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Let's set up your account to get started.</p>
        </div>

        <form method="POST" action="{{ url_for('complete_profile') }}" class="p-8 space-y-6">

            <div>
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                <div class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-500 dark:text-gray-400 cursor-not-allowed flex items-center space-x-2">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <span>{{ email }}</span>
                </div>
            </div>

            <div>
                <label for="full_name" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
                <input
                    type="text"
                    id="full_name"
                    name="full_name"
                    required
                    placeholder="Enter your full name"
                    class="w-full px-4 py-3 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">How will you use PlotMySpace?</label>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="relative cursor-pointer block h-full">
                        <input type="radio" name="role" value="User" class="peer sr-only" required>
                        <div class="h-full p-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl peer-checked:border-primary-500 peer-checked:bg-blue-50 dark:peer-checked:bg-primary-900/20 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-200">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="p-2 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                </div>
                                <h3 class="font-bold text-gray-900 dark:text-white">Homeowner</h3>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">I want to view market trends, site plans, and basic floor layouts.</p>
                        </div>
                        <div class="absolute top-4 right-4 hidden peer-checked:block text-primary-500">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        </div>
                    </label>

                    <label class="relative cursor-pointer block h-full">
                        <input type="radio" name="role" value="Architect" class="peer sr-only" required>
                        <div class="h-full p-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl peer-checked:border-primary-500 peer-checked:bg-blue-50 dark:peer-checked:bg-primary-900/20 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-200">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="p-2 bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                                </div>
                                <h3 class="font-bold text-gray-900 dark:text-white">Architect</h3>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">I need full structural CAD access, layout generation, and feasibility tools.</p>
                        </div>
                        <div class="absolute top-4 right-4 hidden peer-checked:block text-primary-500">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        </div>
                    </label>

                    <label class="relative cursor-pointer block h-full">
                        <input type="radio" name="role" value="Reviewer" class="peer sr-only" required>
                        <div class="h-full p-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl peer-checked:border-primary-500 peer-checked:bg-blue-50 dark:peer-checked:bg-primary-900/20 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-200">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <h3 class="font-bold text-gray-900 dark:text-white">Reviewer</h3>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">I need to review final layouts, pending requests and completed work.</p>
                        </div>
                        <div class="absolute top-4 right-4 hidden peer-checked:block text-primary-500">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        </div>
                    </label>
                </div>
            </div>

            <div class="pt-4">
                <button
                    type="submit"
                    class="w-full bg-primary-600 hover:bg-primary-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/30 transform transition-all duration-200 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 dark:focus:ring-offset-gray-800"
                >
                    Save & Continue
                </button>
            </div>
        </form>
    </div>

</body>
</html>
